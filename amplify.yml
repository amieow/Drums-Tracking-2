version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.33.2
        - pnpm install
    build:
      commands:
        # Write server-side env vars into .env.production so they are available
        # to Next.js API routes (SSR / Lambda) at runtime on Amplify.
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "JWT_SECRET=$JWT_SECRET" >> .env.production
        - echo "DAAS_WS_BROADCAST_URL=${DAAS_WS_BROADCAST_URL:-}" >> .env.production
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**
